<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Opslag · UdNu</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,700&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">
</head>
<body>

  <nav class="navbar">
    <a href="/" class="logo">
      <svg class="logo-pin" viewBox="0 0 24 30" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M12 0C5.373 0 0 5.373 0 12c0 4.215 2.172 7.923 5.455 10.107L12 30l6.545-7.893C21.828 19.923 24 16.215 24 12 24 5.373 18.627 0 12 0z" fill="#0d2247"/><circle cx="12" cy="12" r="4.5" fill="white"/></svg>
      <span class="logo-wordmark"><span class="logo-ud">Ud</span><span class="logo-nu">Nu</span></span>
    </a>
    <div class="nav-links">
      <a href="/booking" class="nav-link-plain">← Alle opslag</a>
      <div id="navAuthWrap"></div>
    </div>
  </nav>

  <!-- LOADING -->
  <div class="loading-screen" id="loadingScreen">
    <div class="loading-inner">
      <div class="loading-spinner"></div>
      <h2>Henter opslag<span class="dots"><span>.</span><span>.</span><span>.</span></span></h2>
    </div>
  </div>

  <!-- ERROR -->
  <div class="error-screen" id="errorScreen" style="display:none;">
    <div class="error-inner">
      <h2>Opslag ikke fundet</h2>
      <p>Dette opslag eksisterer ikke eller er ikke tilgængeligt.</p>
      <a href="/booking" class="btn-primary" style="margin-top:24px;">Se alle opslag →</a>
    </div>
  </div>

  <!-- CONTENT -->
  <div id="listingContent" style="display:none;">

    <!-- HERO IMAGE -->
    <div class="lst-hero" id="lstHero"></div>

    <!-- BODY -->
    <div class="lst-body">

      <!-- LEFT: Info -->
      <div class="lst-info">
        <div class="lst-city-badge" id="lstCity"></div>
        <h1 id="lstTitle"></h1>
        <div class="lst-meta" id="lstMeta"></div>
        <p class="lst-desc" id="lstDesc"></p>

        <div id="lstAmenities"></div>
      </div>

      <!-- RIGHT: Booking form -->
      <div class="lst-booking-card" id="lstBookingCard">
        <div class="lst-price-header" id="lstPriceHeader"></div>

        <div style="margin:20px 0 12px;font-size:13px;font-weight:600;color:#0d2247;">Vælg datoer</div>
        <div id="calContainer"></div>

        <div id="bookingSummary" class="lst-booking-summary" style="display:none;"></div>

        <div style="margin:16px 0 8px;">
          <label style="font-size:13px;font-weight:600;color:#0d2247;display:block;margin-bottom:6px;">Antal gæster</label>
          <input type="number" id="guestsInput" min="1" value="1" style="width:80px;padding:8px 12px;border:1.5px solid var(--border);border-radius:10px;font-size:14px;font-family:inherit;">
        </div>

        <div id="guestFields" style="display:none;margin-top:16px;flex-direction:column;gap:10px;">
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
            <div>
              <label style="font-size:12px;font-weight:600;color:#0d2247;display:block;margin-bottom:4px;">Fornavn *</label>
              <input id="guestFirstName" type="text" placeholder="Fornavn" style="width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:10px;font-size:13px;font-family:inherit;box-sizing:border-box;">
            </div>
            <div>
              <label style="font-size:12px;font-weight:600;color:#0d2247;display:block;margin-bottom:4px;">Efternavn *</label>
              <input id="guestLastName" type="text" placeholder="Efternavn" style="width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:10px;font-size:13px;font-family:inherit;box-sizing:border-box;">
            </div>
          </div>
          <div>
            <label style="font-size:12px;font-weight:600;color:#0d2247;display:block;margin-bottom:4px;">E-mail *</label>
            <input id="guestEmail" type="email" placeholder="din@email.dk" style="width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:10px;font-size:13px;font-family:inherit;box-sizing:border-box;">
          </div>
          <div>
            <label style="font-size:12px;font-weight:600;color:#0d2247;display:block;margin-bottom:4px;">Telefon *</label>
            <input id="guestPhone" type="tel" placeholder="+45 12 34 56 78" style="width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:10px;font-size:13px;font-family:inherit;box-sizing:border-box;">
          </div>
          <div>
            <label style="font-size:12px;font-weight:600;color:#0d2247;display:block;margin-bottom:4px;">Adresse (valgfrit)</label>
            <input id="guestAddress" type="text" placeholder="Gadenavn 12, 9000 Aalborg" style="width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:10px;font-size:13px;font-family:inherit;box-sizing:border-box;">
          </div>
          <div>
            <label style="font-size:12px;font-weight:600;color:#0d2247;display:block;margin-bottom:4px;">Besked til host (valgfrit)</label>
            <textarea id="msgInput" placeholder="Hvornår ankommer I? Spørgsmål?" style="width:100%;resize:none;height:65px;padding:9px 12px;border:1.5px solid var(--border);border-radius:10px;font-size:13px;font-family:inherit;box-sizing:border-box;"></textarea>
          </div>
        </div>

        <button id="bookBtn" class="lst-book-btn" style="display:none;" onclick="submitBooking()">Send bookingforespørgsel</button>
        <div id="bookMsg" class="lst-book-msg"></div>

        <div id="loginPrompt" style="display:none;text-align:center;padding:16px 0;font-size:14px;color:var(--muted);">
          <a href="#" onclick="openAuthModal('login');return false;" style="color:#0d2247;font-weight:600;">Log ind</a> for at booke
        </div>
      </div>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/i18n.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/listing.js"></script>
  <script>fetch("/api/track",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({page:location.pathname,referrer:document.referrer||null})});</script>
</body>
</html>
