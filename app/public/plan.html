<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Din Plan · Hvad Skal Vi?</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="css/main.css">
</head>
<body>

  <nav class="navbar">
    <a href="/" class="logo">
      <svg class="logo-pin" viewBox="0 0 24 30" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M12 0C5.373 0 0 5.373 0 12c0 4.215 2.172 7.923 5.455 10.107L12 30l6.545-7.893C21.828 19.923 24 16.215 24 12 24 5.373 18.627 0 12 0z" fill="#0d2247"/><circle cx="12" cy="12" r="4.5" fill="white"/></svg>
      <span class="logo-wordmark"><span class="logo-ud">Ud</span><span class="logo-nu">Nu</span></span>
    </a>
    <a href="/" class="nav-back-btn" onclick="localStorage.removeItem('plans')">Forside</a>
  </nav>

  <div class="plan-page" id="planPage">

    <!-- BACK BUTTON -->
    <div class="plan-back-wrap">
      <a href="/results" class="plan-back-btn" data-i18n="plan.backBtn">← Se alle 3 planer</a>
    </div>

    <!-- PLAN HERO -->
    <div class="plan-hero" id="planHero">
      <div class="plan-hero-content">
        <span class="plan-emoji" id="planEmoji"></span>
        <h1 id="planTitle"></h1>
        <p class="plan-tagline" id="planTagline"></p>
        <div class="plan-stats" id="planStats"></div>
      </div>
    </div>

    <div class="plan-body">

      <section class="plan-section why-section">
        <h2 data-i18n="plan.whyTitle">Hvorfor passer det til dig</h2>
        <blockquote class="why-quote" id="planWhy"></blockquote>
      </section>

      <section class="plan-section">
        <div class="good-for-tags" id="goodForTags"></div>
      </section>

      <section class="plan-section">
        <h2 data-i18n="plan.stepsTitle">Din plan, trin for trin</h2>
        <div class="timeline" id="planTimeline"></div>
      </section>

      <section class="plan-section map-section">
        <h2 data-i18n="plan.spotsTitle">Find stederne</h2>
        <p class="map-note" data-i18n="plan.mapsNote">Klik på et sted nedenfor for at søge på Google Maps.</p>
        <div class="map-links" id="mapLinks"></div>
        <div id="map" class="map-container"></div>
      </section>

      <section class="plan-section plan-actions">
        <a href="/quiz" class="btn-secondary" data-i18n="plan.diffPlans">Find andre planer</a>
        <button class="btn-primary" id="savePlanBtn" onclick="savePlan(plan)">Gem plan</button>
        <button class="btn-primary" data-i18n="plan.printBtn" onclick="window.print()">Print plan</button>
      </section>

    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/i18n.js"></script>
  <script src="js/plan.js"></script>
  <script src="js/auth.js"></script>
<script>fetch("/api/track",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({page:location.pathname,referrer:document.referrer||null})});</script>
</body>
</html>
