<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Find en Plan · Hvad Skal Vi?</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">
</head>
<body class="quiz-page">

  <nav class="navbar">
    <a href="/" class="logo">
      <span class="logo-wordmark">Hvad<span class="logo-nu">nu</span></span>
    </a>
    <a href="/" class="nav-exit" data-i18n="nav.exit">✕ Afslut</a>
  </nav>

  <div class="quiz-container">

    <!-- PROGRESS -->
    <div class="quiz-progress">
      <button class="quiz-back-btn" id="quizBackBtn" onclick="prevStep()" aria-label="Tilbage">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        Tilbage
      </button>
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <span class="progress-label" id="progressLabel">Step 1 of 6</span>
    </div>

    <!-- STEPS -->
    <div class="quiz-steps" id="quizSteps">

      <!-- STEP 1: City -->
      <div class="quiz-step active" data-step="1" data-key="city">
        <p class="quiz-eyebrow">KOM I GANG</p>
        <h2 class="quiz-question">Hvilken by er I i?</h2>
        <p class="quiz-hint">Vælg din by nedenfor</p>
        <div class="option-grid cols-3" id="cityGrid">
          <p style="color:var(--muted);font-size:14px;">Henter byer...</p>
        </div>
      </div>

      <!-- STEP 2: Who -->
      <div class="quiz-step" data-step="2" data-key="who">
        <p class="quiz-eyebrow" data-i18n="quiz.who.eyebrow">GODT AT VIDE</p>
        <h2 class="quiz-question" data-i18n="quiz.who.question">Hvem er du med i dag?</h2>
        <div class="option-grid cols-3">
          <button class="option-card" data-value="couple">
            <span class="option-label" data-i18n="quiz.couple.label">Date</span>
            <span class="option-sub" data-i18n="quiz.couple.sub">Bare jer to</span>
          </button>
          <button class="option-card" data-value="friends">
            <span class="option-label" data-i18n="quiz.friends.label">Venner</span>
            <span class="option-sub" data-i18n="quiz.friends.sub">Gruppe hygge</span>
          </button>
          <button class="option-card" data-value="family">
            <span class="option-label" data-i18n="quiz.family.label">Familie</span>
            <span class="option-sub" data-i18n="quiz.family.sub">Børn kan være med</span>
          </button>
        </div>
      </div>

      <!-- STEP 3: Budget -->
      <div class="quiz-step" data-step="3" data-key="budget">
        <p class="quiz-eyebrow" data-i18n="quiz.budget.eyebrow">DIT BUDGET</p>
        <h2 class="quiz-question" data-i18n="quiz.budget.question">Hvad er dit budget?</h2>
        <div class="option-grid cols-3">
          <button class="option-card" data-value="low">
            <span class="option-label" data-i18n="quiz.low.label">Lavt</span>
            <span class="option-sub" data-i18n="quiz.low.sub">Under 100kr per person</span>
          </button>
          <button class="option-card" data-value="medium">
            <span class="option-label" data-i18n="quiz.medium.label">Middel</span>
            <span class="option-sub" data-i18n="quiz.medium.sub">100–300kr per person</span>
          </button>
          <button class="option-card" data-value="high">
            <span class="option-label" data-i18n="quiz.high.label">Forkæl os</span>
            <span class="option-sub" data-i18n="quiz.high.sub">300kr+ per person</span>
          </button>
        </div>
      </div>

      <!-- STEP 4: Time -->
      <div class="quiz-step" data-step="4" data-key="time">
        <p class="quiz-eyebrow" data-i18n="quiz.time.eyebrow">DIN TIDSPLAN</p>
        <h2 class="quiz-question" data-i18n="quiz.time.question">Hvor meget tid har I?</h2>
        <div class="option-grid cols-3">
          <button class="option-card" data-value="1h">
            <span class="option-label" data-i18n="quiz.1h.label">Kort udflugt</span>
            <span class="option-sub" data-i18n="quiz.1h.sub">Cirka 1 time</span>
          </button>
          <button class="option-card" data-value="2-3h">
            <span class="option-label" data-i18n="quiz.2-3h.label">Et par timer</span>
            <span class="option-sub" data-i18n="quiz.2-3h.sub">2 til 3 timer</span>
          </button>
          <button class="option-card" data-value="fullday">
            <span class="option-label" data-i18n="quiz.fullday.label">Hel dag</span>
            <span class="option-sub" data-i18n="quiz.fullday.sub">6+ timer, gør det til noget</span>
          </button>
        </div>
      </div>

      <!-- STEP 5: Setting -->
      <div class="quiz-step" data-step="5" data-key="setting">
        <p class="quiz-eyebrow" data-i18n="quiz.setting.eyebrow">STEMNINGEN</p>
        <h2 class="quiz-question" data-i18n="quiz.setting.question">Indendørs eller udendørs?</h2>
        <div class="option-grid cols-3">
          <button class="option-card" data-value="indoor">
            <span class="option-label" data-i18n="quiz.indoor.label">Indendørs</span>
            <span class="option-sub" data-i18n="quiz.indoor.sub">Caféer, gallerier, steder</span>
          </button>
          <button class="option-card" data-value="outdoor">
            <span class="option-label" data-i18n="quiz.outdoor.label">Udendørs</span>
            <span class="option-sub" data-i18n="quiz.outdoor.sub">Parker, markeder, gader</span>
          </button>
          <button class="option-card" data-value="mix">
            <span class="option-label" data-i18n="quiz.mix.label">Bland det</span>
            <span class="option-sub" data-i18n="quiz.mix.sub">Begge er fint</span>
          </button>
        </div>
      </div>

      <!-- STEP 6: Mood -->
      <div class="quiz-step" data-step="6" data-key="mood">
        <p class="quiz-eyebrow" data-i18n="quiz.mood.eyebrow">SIDSTE SPØRGSMÅL</p>
        <h2 class="quiz-question" data-i18n="quiz.mood.question">Hvad er stemningen?</h2>
        <div class="option-grid cols-5">
          <button class="option-card" data-value="cozy">
            <span class="option-label" data-i18n="quiz.cozy.label">Hyggeligt</span>
          </button>
          <button class="option-card" data-value="active">
            <span class="option-label" data-i18n="quiz.active.label">Aktivt</span>
          </button>
          <button class="option-card" data-value="relaxed">
            <span class="option-label" data-i18n="quiz.relaxed.label">Afslappet</span>
          </button>
          <button class="option-card" data-value="romantic">
            <span class="option-label" data-i18n="quiz.romantic.label">Romantisk</span>
          </button>
          <button class="option-card" data-value="fun">
            <span class="option-label" data-i18n="quiz.fun.label">Sjovt</span>
          </button>
        </div>
      </div>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/i18n.js"></script>
  <script src="js/quiz.js"></script>
  <script src="js/auth.js"></script>
<script>fetch("/api/track",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({page:location.pathname,referrer:document.referrer||null})});</script>
</body>
</html>
