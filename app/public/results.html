<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Dine Planer · Hvad Skal Vi?</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">
</head>
<body>

  <nav class="navbar">
    <a href="/" class="logo">
      <span class="logo-icon">✦</span>
      <span class="logo-text" data-i18n="nav.logo">Hvad Skal Vi?</span>
    </a>
    <a href="quiz.html" class="nav-link-plain" data-i18n="nav.tryAgain">← Prøv igen</a>
    <button class="lang-toggle" id="langToggle" onclick="applyLang(getCurrentLang()==='da'?'en':'da')">🇬🇧 EN</button>
  </nav>

  <!-- LOADING STATE -->
  <div class="loading-screen" id="loadingScreen">
    <div class="loading-inner">
      <div class="loading-spinner"></div>
      <h2 data-i18n="results.loading">Finder dine perfekte planer<span class="dots"><span>.</span><span>.</span><span>.</span></span></h2>
      <p id="loadingHint" data-i18n="results.hint1">Matcher din stemning med de bedste aktiviteter...</p>
    </div>
  </div>

  <!-- ERROR STATE -->
  <div class="error-screen" id="errorScreen" style="display:none;">
    <div class="error-inner">
      <span style="font-size: 48px;">😕</span>
      <h2 data-i18n="results.error">Noget gik galt</h2>
      <p id="errorMsg">Could not generate plans. Please try again.</p>
      <a href="quiz.html" class="btn-primary" style="margin-top: 24px;" data-i18n="results.tryAgain">Prøv igen →</a>
    </div>
  </div>

  <!-- RESULTS -->
  <div class="results-page" id="resultsPage" style="display:none;">

    <div class="results-header">
      <p class="eyebrow" data-i18n="results.eyebrow">DINE PLANER</p>
      <h1 data-i18n="results.title">Her er dine <em>3 planer</em></h1>
      <p class="results-sub" id="resultsSub"></p>
    </div>

    <div class="results-grid" id="resultsGrid"></div>

    <div class="results-footer">
      <p data-i18n="results.notFeeling">Ikke tilfreds med nogen af dem?</p>
      <a href="quiz.html" class="btn-secondary" data-i18n="results.newPlans">Generer nye planer →</a>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/i18n.js"></script>
  <script src="js/results.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
